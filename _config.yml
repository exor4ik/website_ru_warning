theme: jekyll-theme-slate

# Explicitly disable Jekyll processing of certain files
include:
  - .nojekyll
  - .htaccess

exclude:
  - .github/
  - .git/
  - .gitignore
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - run_server.py
  - README.md

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM

# Analytics and plugins
plugins:
  - jekyll-seo-tag
  - jekyll-feed

# URL configuration (update with your repository name)
baseurl: "/website_ru_warning"
url: "https://exor4ik.github.io"

# Site metadata
title: "PS2 RSOD Warning"
description: "Warning page with PS2 RSOD style"
author: "exor4ik"

# Build settings
permalink: /:categories/:year/:month/:day/:title:output_ext

