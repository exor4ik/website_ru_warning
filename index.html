<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS2 Style RSOD with Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #000000;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        #three-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .message-container {
            position: relative;
            z-index: 10;
            max-width: 80%;
            padding: 20px;
        }

        .message {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000000, -1px -1px 0px #000000, 1px -1px 0px #000000, -1px 1px 0px #000000, 1px 1px 0px #000000;
            background-color: rgba(255, 0, 0, 0.8);
            padding: 30px;
            border: 4px solid #000000;
            border-radius: 8px;
            position: relative;
        }

        .ps2-logo {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #00ffff;
            text-shadow: 2px 2px 0px #000000;
        }

        .button-3d {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(145deg, #ff0000, #cc0000);
            color: white;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            border: 3px solid #000000;
            border-radius: 8px;
            position: relative;
            transition: all 0.3s;
            box-shadow: 5px 5px 0px #000000;
            cursor: pointer;
        }

        .button-3d:hover {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #000000;
            background: linear-gradient(145deg, #e60000, #b30000);
        }

        .button-3d:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px #000000;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                rgba(255, 255, 255, 0.1) 50%,
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 15;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                ellipse at center,
                rgba(0, 0, 0, 0.8) 0%,
                rgba(0, 0, 0, 0) 70%
            );
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <audio id="bgm" src="music.mp3" loop preload="auto" autoplay muted playsinline></audio>

    <div id="three-container"></div>

    <div class="message-container">
        <div class="message">
            В связи с ужесточением русских законов о веб сайтах<br>
            сайт возвращается на старую ссылку:<br>
            exor4ik.github.io/website
        </div>
        <div class="ps2-logo"></div>
        <a href="https://exor4ik.github.io/website" class="button-3d" id="redirect-button">
            ПЕРЕЙТИ
        </a>
    </div>

    <script src="three.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bgm');
            audio.volume = 0.5;

            const tryPlay = () => {
                audio.play().then(() => {
                    setTimeout(() => {
                        audio.muted = false;
                    }, 100);
                }).catch(() => {
                    const startOnGesture = () => {
                        audio.play().then(() => {
                            audio.muted = false;
                        }).catch(err => console.log('Playback failed:', err));

                        window.removeEventListener('click', startOnGesture);
                        window.removeEventListener('mousemove', startOnGesture);
                        window.removeEventListener('touchstart', startOnGesture);
                        window.removeEventListener('keydown', startOnGesture);
                        window.removeEventListener('scroll', startOnGesture);
                    };

                    window.addEventListener('click', startOnGesture, { once: true });
                    window.addEventListener('mousemove', startOnGesture, { once: true });
                    window.addEventListener('touchstart', startOnGesture, { once: true });
                    window.addEventListener('keydown', startOnGesture, { once: true });
                    window.addEventListener('scroll', startOnGesture, { once: true });
                });
            };

            tryPlay();

            const audioControl = document.createElement('div');
            audioControl.style.position = 'fixed';
            audioControl.style.bottom = '20px';
            audioControl.style.right = '20px';
            audioControl.style.zIndex = '100';
            audioControl.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
            audioControl.style.padding = '10px';
            audioControl.style.borderRadius = '5px';
            audioControl.style.border = '2px solid #ff0000';
            audioControl.style.color = 'white';
            audioControl.style.fontFamily = 'Courier New, monospace';
            audioControl.style.cursor = 'pointer';

            audioControl.innerHTML = `
                <span id="audio-status">🎵 Music: ON</span>
                <button id="toggle-music" style="margin-left: 10px; background: none; border: none; color: white; cursor: pointer; font-size: 16px;">⏸️</button>
            `;

            document.body.appendChild(audioControl);

            const toggleButton = document.getElementById('toggle-music');
            const statusText = document.getElementById('audio-status');

            toggleButton.addEventListener('click', function() {
                if (audio.paused) {
                    audio.play().catch(e => console.log('Playback failed:', e));
                    statusText.textContent = '🎵 Music: ON';
                    toggleButton.textContent = '⏸️';
                } else {
                    audio.pause();
                    statusText.textContent = '🎵 Music: OFF';
                    toggleButton.textContent = '▶️';
                }
            });
        });
    </script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        document.getElementById('three-container').appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xff0000, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xff0000, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        const rotatingCubes = [];
        const rotatingCubeGroup = new THREE.Group();
        scene.add(rotatingCubeGroup);

        for (let i = 0; i < 8; i++) {
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.6,
                specular: 0xffffff,
                shininess: 50,
                side: THREE.DoubleSide
            });

            const cube = new THREE.Mesh(geometry, material);
            cube.position.x = (Math.random() - 0.5) * 15;
            cube.position.y = (Math.random() - 0.5) * 15;
            cube.position.z = (Math.random() - 0.5) * 15;

            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
                color: 0xff0000,
                linewidth: 2,
                transparent: true,
                opacity: 0.8
            }));
            cube.add(line);

            rotatingCubeGroup.add(cube);
            rotatingCubes.push(cube);
        }

        const flyingCubes = [];
        let lastSpawnTime = 0;
        const spawnInterval = 1000;

        function createFlyingCube() {
            const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const material = new THREE.MeshPhongMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.0,
                specular: 0xffffff,
                shininess: 30
            });

            const cube = new THREE.Mesh(geometry, material);

            const side = Math.floor(Math.random() * 4);
            const distance = 20 + Math.random() * 10;

            switch(side) {
                case 0: cube.position.set((Math.random() - 0.5) * 30, distance, (Math.random() - 0.5) * 30); break;
                case 1: cube.position.set(distance, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30); break;
                case 2: cube.position.set((Math.random() - 0.5) * 30, -distance, (Math.random() - 0.5) * 30); break;
                case 3: cube.position.set(-distance, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30); break;
            }

            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.0
            }));
            cube.add(line);

            cube.userData = {
                direction: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                ),
                rotationSpeed: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02
                ),
                lifetime: 10000 + Math.random() * 5000,
                fadeInDuration: 1000,
                fadeInProgress: 0,
                fadeOutDuration: 2000,
                fadeOutStarted: false
            };

            scene.add(cube);
            flyingCubes.push(cube);
        }

        camera.position.z = 15;

        function animate(currentTime) {
            requestAnimationFrame(animate);

            if (currentTime - lastSpawnTime > spawnInterval) {
                createFlyingCube();
                lastSpawnTime = currentTime;

                if (flyingCubes.length > 20) {
                    const oldCube = flyingCubes.shift();
                    scene.remove(oldCube);
                }
            }

            const deltaTime = 16;
            flyingCubes.forEach((cube, index) => {
                const data = cube.userData;

                if (data.fadeInProgress < data.fadeInDuration) {
                    data.fadeInProgress += deltaTime;
                    const fadeInRatio = Math.min(1, data.fadeInProgress / data.fadeInDuration);
                    cube.material.opacity = 0.7 * fadeInRatio;
                    cube.children[0].material.opacity = 0.6 * fadeInRatio;
                } else if (!data.fadeOutStarted && data.lifetime < data.fadeOutDuration) {
                    data.fadeOutStarted = true;
                }

                if (data.fadeOutStarted) {
                    const fadeOutRatio = 1 - (data.fadeOutDuration - data.lifetime) / data.fadeOutDuration;
                    cube.material.opacity = 0.7 * (1 - fadeOutRatio);
                    cube.children[0].material.opacity = 0.6 * (1 - fadeOutRatio);
                }

                cube.position.add(data.direction);
                cube.rotation.x += data.rotationSpeed.x;
                cube.rotation.y += data.rotationSpeed.y;
                cube.rotation.z += data.rotationSpeed.z;

                data.lifetime -= deltaTime;

                if (data.lifetime <= 0) {
                    scene.remove(cube);
                    flyingCubes.splice(index, 1);
                }
            });

            rotatingCubeGroup.rotation.x += 0.005;
            rotatingCubeGroup.rotation.y += 0.005;

            rotatingCubes.forEach((cube, index) => {
                cube.rotation.x += 0.01 * (index % 2 === 0 ? 1 : -1);
                cube.rotation.y += 0.01 * (index % 3 === 0 ? 1 : -1);
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;

            camera.position.x = mouseX * 2;
            camera.position.y = mouseY * 2;
            camera.lookAt(scene.position);
        });

        document.addEventListener('mouseleave', () => {
            camera.position.x = 0;
            camera.position.y = 0;
            camera.position.z = 15;
            camera.lookAt(scene.position);
        });

        animate(0);
    </script>
</body>
</html>
