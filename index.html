<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS2 Style RSOD with Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background-color: #000000;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        #three-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .message-container {
            position: relative;
            z-index: 10;
            max-width: 80%;
            padding: 20px;
        }

        .message {
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 3px 3px 0px #000000, -1px -1px 0px #000000, 1px -1px 0px #000000, -1px 1px 0px #000000, 1px 1px 0px #000000;
            background-color: rgba(255, 0, 0, 0.8);
            padding: 30px;
            border: 4px solid #000000;
            border-radius: 8px;
            position: relative;
        }

        .ps2-logo {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #00ffff;
            text-shadow: 2px 2px 0px #000000;
        }

        .button-3d {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: linear-gradient(145deg, #ff0000, #cc0000);
            color: white;
            text-decoration: none;
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            border: 3px solid #000000;
            border-radius: 8px;
            position: relative;
            transition: all 0.3s;
            box-shadow: 5px 5px 0px #000000;
            cursor: pointer;
        }

        .button-3d:hover {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #000000;
            background: linear-gradient(145deg, #e60000, #b30000);
        }

        .button-3d:active {
            transform: translate(5px, 5px);
            box-shadow: 0px 0px 0px #000000;
        }

        /* PS2-style scanlines */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                rgba(255, 255, 255, 0.1) 50%,
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 2px;
            pointer-events: none;
            z-index: 15;
        }

        /* CRT effect */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                ellipse at center,
                rgba(0, 0, 0, 0.8) 0%,
                rgba(0, 0, 0, 0) 70%
            );
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="three-container"></div>

    <div class="message-container">
        <div class="message">
            В связи с ужесточением русских законов о веб сайтах<br>
            сайт возвращается на старую ссылку:<br>
            exor4ik.github.io/website
        </div>
        <div class="ps2-logo">
            PLAYSTATION 2 STYLE ERROR
        </div>
        <a href="https://exor4ik.github.io/website" class="button-3d" id="redirect-button">
            ПЕРЕЙТИ
        </a>
    </div>

    <script src="three.min.js"></script>
    <script>
        // Three.js setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0);
        document.getElementById('three-container').appendChild(renderer.domElement);

        // Add ambient light
        const ambientLight = new THREE.AmbientLight(0xff0000, 0.5);
        scene.add(ambientLight);

        // Add directional light
        const directionalLight = new THREE.DirectionalLight(0xff0000, 1);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);

        // Create rotating cube group
        const rotatingCubes = [];
        const rotatingCubeGroup = new THREE.Group();
        scene.add(rotatingCubeGroup);

        // Create glass-like red cubes that rotate
        for (let i = 0; i < 8; i++) {
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshPhongMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.6,
                specular: 0xffffff,
                shininess: 50,
                side: THREE.DoubleSide
            });

            const cube = new THREE.Mesh(geometry, material);
            cube.position.x = (Math.random() - 0.5) * 15;
            cube.position.y = (Math.random() - 0.5) * 15;
            cube.position.z = (Math.random() - 0.5) * 15;

            // Add wireframe edges
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
                color: 0xff0000,
                linewidth: 2,
                transparent: true,
                opacity: 0.8
            }));
            cube.add(line);

            rotatingCubeGroup.add(cube);
            rotatingCubes.push(cube);
        }

        // Flying cubes that spawn outside screen
        const flyingCubes = [];
        let lastSpawnTime = 0;
        const spawnInterval = 1000; // 1 second

        function createFlyingCube() {
            const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const material = new THREE.MeshPhongMaterial({
                color: 0xff0000,
                transparent: true,
                opacity: 0.7,
                specular: 0xffffff,
                shininess: 30
            });

            const cube = new THREE.Mesh(geometry, material);

            // Spawn outside screen (random side)
            const side = Math.floor(Math.random() * 4);
            const distance = 20 + Math.random() * 10;

            switch(side) {
                case 0: // top
                    cube.position.set((Math.random() - 0.5) * 30, distance, (Math.random() - 0.5) * 30);
                    break;
                case 1: // right
                    cube.position.set(distance, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30);
                    break;
                case 2: // bottom
                    cube.position.set((Math.random() - 0.5) * 30, -distance, (Math.random() - 0.5) * 30);
                    break;
                case 3: // left
                    cube.position.set(-distance, (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 30);
                    break;
            }

            // Add wireframe
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
                color: 0xff0000,
                linewidth: 1,
                transparent: true,
                opacity: 0.6
            }));
            cube.add(line);

            // Set random direction away from center
            cube.userData = {
                direction: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1,
                    (Math.random() - 0.5) * 0.1
                ),
                rotationSpeed: new THREE.Vector3(
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02,
                    (Math.random() - 0.5) * 0.02
                ),
                lifetime: 10000 + Math.random() * 5000 // 10-15 seconds
            };

            scene.add(cube);
            flyingCubes.push(cube);
        }

        camera.position.z = 15;

        // Animation loop
        function animate(currentTime) {
            requestAnimationFrame(animate);

            // Spawn new flying cubes periodically
            if (currentTime - lastSpawnTime > spawnInterval) {
                createFlyingCube();
                lastSpawnTime = currentTime;

                // Remove old cubes
                if (flyingCubes.length > 20) {
                    const oldCube = flyingCubes.shift();
                    scene.remove(oldCube);
                }
            }

            // Update flying cubes
            flyingCubes.forEach((cube, index) => {
                const data = cube.userData;

                // Move cube
                cube.position.add(data.direction);

                // Rotate cube
                cube.rotation.x += data.rotationSpeed.x;
                cube.rotation.y += data.rotationSpeed.y;
                cube.rotation.z += data.rotationSpeed.z;

                // Fade out over time
                cube.material.opacity = Math.max(0.1, cube.userData.lifetime / 15000);
                cube.userData.lifetime -= 30;

                // Remove if lifetime expired
                if (cube.userData.lifetime <= 0) {
                    scene.remove(cube);
                    flyingCubes.splice(index, 1);
                }
            });

            // Rotate the main cube group
            rotatingCubeGroup.rotation.x += 0.005;
            rotatingCubeGroup.rotation.y += 0.005;

            // Individual rotations for main cubes
            rotatingCubes.forEach((cube, index) => {
                cube.rotation.x += 0.01 * (index % 2 === 0 ? 1 : -1);
                cube.rotation.y += 0.01 * (index % 3 === 0 ? 1 : -1);
            });

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Add mouse interaction for camera
        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;

            // Subtle camera movement
            camera.position.x = mouseX * 2;
            camera.position.y = mouseY * 2;
            camera.lookAt(scene.position);
        });

        // Reset camera on mouse leave
        document.addEventListener('mouseleave', () => {
            camera.position.x = 0;
            camera.position.y = 0;
            camera.position.z = 15;
            camera.lookAt(scene.position);
        });

        // Start animation
        animate(0);
    </script>
</body>
</html>
